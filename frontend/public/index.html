<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#004D38" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="منصة خدمات الحشود - الإدارة العامة للتخطيط وخدمات الحشود في الحرم المكي الشريف" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>منصة خدمات الحشود | Al-Haram OS</title>
    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
    </style>
    <script>
      // Suppress ResizeObserver errors
      window.addEventListener('error', e => {
        if (e.message && e.message.includes('ResizeObserver')) {
          e.stopImmediatePropagation();
          e.stopPropagation();
          e.preventDefault();
          return false;
        }
      });
      
      // Override console.error
      const _error = console.error;
      console.error = function(...args) {
        if (args && args[0] && typeof args[0] === 'string' && args[0].includes('ResizeObserver')) {
          return;
        }
        _error.apply(console, args);
      };
    </script>
  </head>
  <body>
    <noscript>يجب تفعيل JavaScript لتشغيل هذا التطبيق.</noscript>
    <div id="root"></div>
    
    <script>
      // Remove skeleton on page load
      document.addEventListener('DOMContentLoaded', function() {
        // Wait for React to mount
        setTimeout(function() {
          var skeleton = document.getElementById('login-skeleton');
          if (skeleton) {
            skeleton.classList.add('hidden');
            setTimeout(function() {
              skeleton.remove();
            }, 300);
          }
        }, 100);
      });
    </script>
  </body>
</html>
