<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#004D38" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="منصة خدمات الحشود - الإدارة العامة للتخطيط وخدمات الحشود في الحرم المكي الشريف" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>منصة خدمات الحشود | Al-Haram OS</title>
    <script>
      // Suppress ResizeObserver errors
      window.addEventListener('error', e => {
        if (e.message && e.message.includes('ResizeObserver')) {
          e.stopImmediatePropagation();
          e.stopPropagation();
          e.preventDefault();
          return false;
        }
      });
      
      // Override console.error
      const _error = console.error;
      console.error = function(...args) {
        if (args && args[0] && typeof args[0] === 'string' && args[0].includes('ResizeObserver')) {
          return;
        }
        _error.apply(console, args);
      };
    </script>
  </head>
  <body>
    <!-- Initial Loading Screen -->
    <div class="initial-loader" id="initial-loader">
      <div class="spinner">
        <div class="spinner-inner">
          <div class="spinner-text">ح</div>
        </div>
      </div>
      <div class="loading-text">جاري التحميل...</div>
    </div>
    
    <noscript>يجب تفعيل JavaScript لتشغيل هذا التطبيق.</noscript>
    <div id="root"></div>
    
    <script>
      // Remove loader and show root when React is ready
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loader = document.getElementById('initial-loader');
          const root = document.getElementById('root');
          
          if (loader) {
            loader.style.transition = 'opacity 0.3s ease-out';
            loader.style.opacity = '0';
            setTimeout(function() {
              loader.style.display = 'none';
            }, 300);
          }
          
          if (root) {
            root.classList.add('loaded');
          }
        }, 100);
      });
    </script>
  </body>
</html>
