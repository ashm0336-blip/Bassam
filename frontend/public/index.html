<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#004D38" />
    <meta name="description" content="منصة خدمات الحشود - الإدارة العامة للتخطيط وخدمات الحشود في الحرم المكي الشريف" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>منصة خدمات الحشود | Al-Haram OS</title>
    <style>
      /* Prevent FOUC (Flash of Unstyled Content) */
      #root {
        opacity: 0;
        transition: opacity 0.3s ease-in;
      }
      #root.loaded {
        opacity: 1;
      }
      
      /* Loading spinner */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #F8F8F6;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      
      .initial-loader .spinner {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #047857, #047857dd);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulse 1.5s ease-in-out infinite;
        box-shadow: 0 10px 40px rgba(4, 120, 87, 0.3);
      }
      
      .initial-loader .spinner-inner {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      .initial-loader .spinner-text {
        font-family: 'Cairo', sans-serif;
        font-size: 32px;
        font-weight: bold;
        color: white;
      }
      
      .initial-loader .loading-text {
        position: absolute;
        bottom: 40%;
        font-family: 'Cairo', sans-serif;
        font-size: 18px;
        color: #6B7280;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
    </style>
    <script>
      // Suppress ResizeObserver errors
      window.addEventListener('error', e => {
        if (e.message && e.message.includes('ResizeObserver')) {
          e.stopImmediatePropagation();
          e.stopPropagation();
          e.preventDefault();
          return false;
        }
      });
      
      // Override console.error
      const _error = console.error;
      console.error = function(...args) {
        if (args && args[0] && typeof args[0] === 'string' && args[0].includes('ResizeObserver')) {
          return;
        }
        _error.apply(console, args);
      };
    </script>
  </head>
  <body>
    <noscript>يجب تفعيل JavaScript لتشغيل هذا التطبيق.</noscript>
    <div id="root"></div>
  </body>
</html>
