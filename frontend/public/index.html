<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#004D38" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="منصة خدمات الحشود - الإدارة العامة للتخطيط وخدمات الحشود في الحرم المكي الشريف" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>منصة خدمات الحشود | Al-Haram OS</title>
    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
    </style>
    <script>
      // Suppress ResizeObserver errors
      window.addEventListener('error', e => {
        if (e.message && e.message.includes('ResizeObserver')) {
          e.stopImmediatePropagation();
          e.stopPropagation();
          e.preventDefault();
          return false;
        }
      });
      
      // Override console.error
      const _error = console.error;
      console.error = function(...args) {
        if (args && args[0] && typeof args[0] === 'string' && args[0].includes('ResizeObserver')) {
          return;
        }
        _error.apply(console, args);
      };
    </script>
    <script>
      // Pre-load login settings BEFORE React renders (prevents FOUC)
      window.__LOGIN_SETTINGS__ = {
        primary_color: "#047857",
        background_url: "https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?auto=format&fit=crop&w=1920&q=80",
        logo_url: "",
        logo_size: 150,
        logo_link: "/",
        site_name_ar: "منصة خدمات الحشود",
        site_name_en: "Crowd Services Platform",
        subtitle_ar: "الإدارة العامة للتخطيط وخدمات الحشود في الحرم المكي الشريف",
        subtitle_en: "General Administration for Planning and Crowd Services at the Grand Mosque",
        welcome_text_ar: "مرحباً بك في",
        welcome_text_en: "Welcome to"
      };
      
      // Fetch actual settings asynchronously and update if different
      (function() {
        try {
          fetch(window.location.origin + '/api/settings/login-page')
            .then(function(response) {
              if (response.ok) {
                return response.json();
              }
              throw new Error('Failed to fetch settings');
            })
            .then(function(settings) {
              window.__LOGIN_SETTINGS__ = settings;
              // Trigger a custom event for React to potentially re-render if needed
              window.dispatchEvent(new CustomEvent('loginSettingsLoaded', { detail: settings }));
            })
            .catch(function(e) {
              console.warn('Using default login settings:', e);
            });
        } catch (e) {
          console.warn('Failed to load login settings:', e);
        }
      })();
    </script>
  </head>
  <body>
    <noscript>يجب تفعيل JavaScript لتشغيل هذا التطبيق.</noscript>
    <div id="root"></div>
  </body>
</html>
